<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/static/css/style_login.css">
</head>

<body>

  <div class="container">
    <div class="card">

      <div class="login-box">
        <h2>Login</h2>
        <p>Plataforma clínica</p>

        <form action="/" method="POST">
          {{ form.hidden_tag() }}

          <!-- Usuário -->
          <div class="input-group">
            {{ form.usuario(
              id="usuario",
              placeholder="Usuário",
              class_="input-field"
            ) }}
          </div>

          <!-- Senha -->
          <div class="input-group password-group">
  {{ form.senha(
    id="senha",
    placeholder="Senha",
    class_="input-field"
  ) }}

  <span class="toggle-password" onclick="toggleSenha()">

    <!-- Olho aberto -->
    <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-width="2" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
      <circle stroke-width="2" cx="12" cy="12" r="3"/>
    </svg>

    <!-- Olho fechado -->
    <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-width="2" d="M17.94 17.94A10.94 10.94 0 0112 19C5 19 1 12 1 12a21.77 21.77 0 015.06-6.94M9.9 4.24A10.94 10.94 0 0112 5c7 0 11 7 11 7a21.77 21.77 0 01-4.35 5.52M1 1l22 22"/>
    </svg>

  </span>
</div>

          <!-- Botão -->
          <button type="submit">Entrar</button>
        </form>
      </div>

      <div class="image-box">
        <img src="/static/img/illustration.png" alt="Ilustração">
      </div>

    </div>
  </div>

 <script>
function toggleSenha() {
  const input = document.getElementById("senha");
  const eyeOpen = document.getElementById("eye-open");
  const eyeClosed = document.getElementById("eye-closed");

  if (input.type === "password") {
    input.type = "text";
    eyeOpen.style.display = "none";
    eyeClosed.style.display = "block";
  } else {
    input.type = "password";
    eyeOpen.style.display = "block";
    eyeClosed.style.display = "none";
  }
}
</script>

</body>
</html>
